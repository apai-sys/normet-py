repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.1
    hooks:
      - id: mypy
        additional_dependencies:
          - pandas-stubs
          - types-PyYAML
          # Pin numpy: its >=2.2 stubs use PEP 695 `type` aliases that mypy
          # rejects under our python_version=3.10 target (numpy/__init__.pyi).
          - numpy<2.2
        args: ["--config-file=pyproject.toml"]
        # gui/ is a PySide6 desktop app (dynamic Qt attribute patterns mypy
        # can't verify) and packaging/ is build tooling — neither is part of
        # the typed public API that `[tool.mypy] files` targets.
        exclude: ^(tests/|docs/|examples/|notebooks/|src/normet/gui/|packaging/)

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest tests -q --no-header
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
