name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and test deps
        run: |
          python -m pip install -U pip
          # Install every optional extra so all tests run (and count toward
          # coverage) instead of silently skipping for missing imports.
          pip install -e ".[all,dev]"
      - name: Ruff (lint)
        run: ruff check src tests
      - name: Ruff (format check)
        run: ruff format --check src tests
      - name: Pytest with coverage
        # Measured ~72% with flaml+lgb installed; gate set just below with margin.
        # Raise further as tests are added for the causal pipeline (do_all,
        # placebo, panel) and the FLAML backend.
        env:
          MPLBACKEND: Agg
          PYTENSOR_FLAGS: "cxx="
        run: pytest --cov=normet --cov-report=term-missing --cov-fail-under=70
      - name: mypy
        run: mypy src/normet
      - name: Docs build check
        run: |
          pip install -e ".[docs]"
          sphinx-build -W docs/ docs/_build/
