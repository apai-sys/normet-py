name: Feature request
description: Propose a new capability or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: |
        Describe the scientific or workflow problem. Skip implementation details
        for now.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behaviour
      description: How would this look from a user's perspective?
      render: python
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds exist today, and why are they insufficient?
